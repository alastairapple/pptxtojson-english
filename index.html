<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Convert PowerPoint (.pptx) files to readable JSON data directly in your browser" />
	<meta name="keywords" content="pptx2json,pptxtojson,ppt,powerpoint,json,javascript,ppt parser,ppt to json converter" />
	<link rel="icon" href="favicon.ico">
	<title>PPTX to JSON Converter - Convert PowerPoint to JSON</title>	

	<script src="dist/index.umd.js"></script>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html, body {
			height: 100%;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
		}

		::-webkit-scrollbar {
			width: 8px;
			height: 8px;
		}
		::-webkit-scrollbar-track {
			background: #f1f1f1;
			border-radius: 4px;
		}
		::-webkit-scrollbar-thumb {
			background: #c1c1c1;
			border-radius: 4px;
		}
		::-webkit-scrollbar-thumb:hover {
			background: #a8a8a8;
		}

		body {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			padding: 20px;
			display: flex;
			flex-direction: column;
			gap: 20px;
		}

		.header {
			text-align: center;
			color: white;
			margin-bottom: 20px;
		}

		.header h1 {
			font-size: 2.5rem;
			font-weight: 300;
			margin-bottom: 0.5rem;
		}

		.header p {
			font-size: 1.1rem;
			opacity: 0.9;
		}

		.container {
			display: flex;
			flex-direction: column;
			gap: 20px;
			flex: 1;
			max-width: 1400px;
			margin: 0 auto;
			width: 100%;
		}

		.upload-section {
			background: white;
			border-radius: 12px;
			padding: 30px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
			text-align: center;
		}

		.upload-area {
			border: 3px dashed #e0e0e0;
			border-radius: 8px;
			padding: 40px 20px;
			cursor: pointer;
			transition: all 0.3s ease;
			position: relative;
		}

		.upload-area:hover, .upload-area.dragover {
			border-color: #667eea;
			background-color: #f8f9ff;
		}

		.upload-icon {
			font-size: 48px;
			color: #667eea;
			margin-bottom: 16px;
		}

		.upload-text {
			font-size: 1.2rem;
			color: #333;
			margin-bottom: 8px;
		}

		.upload-subtext {
			font-size: 0.9rem;
			color: #666;
			margin-bottom: 20px;
		}

		.upload-button {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			border: none;
			padding: 12px 30px;
			border-radius: 6px;
			font-size: 1rem;
			cursor: pointer;
			transition: all 0.3s ease;
		}

		.upload-button:hover {
			transform: translateY(-2px);
			box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
		}

		.upload-input {
			display: none;
		}

		.result-section {
			background: white;
			border-radius: 12px;
			padding: 20px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
			display: none;
			flex-direction: column;
			flex: 1;
		}

		.result-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 20px;
			padding-bottom: 15px;
			border-bottom: 2px solid #f0f0f0;
		}

		.result-title {
			font-size: 1.3rem;
			color: #333;
			font-weight: 600;
		}

		.download-button {
			background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
			color: white;
			border: none;
			padding: 10px 20px;
			border-radius: 6px;
			font-size: 0.9rem;
			cursor: pointer;
			transition: all 0.3s ease;
			display: flex;
			align-items: center;
			gap: 8px;
		}

		.download-button:hover {
			transform: translateY(-2px);
			box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
		}

		#jsoneditor {
			flex: 1;
			min-height: 400px;
			border-radius: 8px;
			overflow: auto;
			border: 2px solid #f0f0f0;
			background: #fafafa;
		}

		.json-viewer {
			font-family: 'Courier New', monospace;
			font-size: 14px;
			line-height: 1.4;
			padding: 20px;
			white-space: pre-wrap;
			word-wrap: break-word;
		}

		.json-viewer .json-key {
			color: #0451a5;
			font-weight: bold;
		}

		.json-viewer .json-string {
			color: #0a3069;
		}

		.json-viewer .json-number {
			color: #0550ae;
		}

		.json-viewer .json-boolean {
			color: #cf222e;
			font-weight: bold;
		}

		.json-viewer .json-null {
			color: #6e7781;
			font-style: italic;
		}

		.json-viewer .json-brace,
		.json-viewer .json-bracket {
			color: #24292f;
			font-weight: bold;
		}

		.json-empty-state {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100%;
			color: #666;
			text-align: center;
			padding: 40px 20px;
		}

		.json-empty-state .icon {
			font-size: 64px;
			margin-bottom: 20px;
			opacity: 0.5;
		}

		.json-empty-state h3 {
			margin: 0 0 10px 0;
			color: #333;
		}

		.json-empty-state p {
			margin: 0;
			opacity: 0.8;
		}

		.links {
			display: flex;
			justify-content: center;
			gap: 20px;
			margin-top: 20px;
		}

		.links a {
			color: white;
			text-decoration: none;
			padding: 8px 16px;
			background: rgba(255, 255, 255, 0.1);
			border-radius: 6px;
			transition: all 0.3s ease;
			backdrop-filter: blur(10px);
		}

		.links a:hover {
			background: rgba(255, 255, 255, 0.2);
			transform: translateY(-1px);
		}

		.loading {
			display: none;
			text-align: center;
			color: #667eea;
			font-size: 1.1rem;
			margin: 20px 0;
		}

		.loading-spinner {
			border: 3px solid #f3f3f3;
			border-top: 3px solid #667eea;
			border-radius: 50%;
			width: 40px;
			height: 40px;
			animation: spin 1s linear infinite;
			margin: 0 auto 15px;
		}

		@keyframes spin {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}

		/* Mobile Responsive Styles */
		@media (max-width: 768px) {
			body {
				padding: 10px;
			}

			.header h1 {
				font-size: 2rem;
			}

			.header p {
				font-size: 1rem;
			}

			.upload-section {
				padding: 20px;
			}

			.upload-area {
				padding: 30px 15px;
			}

			.upload-text {
				font-size: 1.1rem;
			}

			.result-header {
				flex-direction: column;
				gap: 15px;
				align-items: stretch;
			}

			.links {
				flex-direction: column;
				align-items: center;
			}
		}

		@media (max-width: 480px) {
			.header h1 {
				font-size: 1.5rem;
			}

			.upload-area {
				padding: 20px 10px;
			}

			.upload-icon {
				font-size: 36px;
			}

			.upload-text {
				font-size: 1rem;
			}

			.upload-subtext {
				font-size: 0.8rem;
			}
		}

		/* Desktop: side-by-side layout */
		@media (min-width: 1200px) {
			.container {
				flex-direction: row;
				align-items: stretch;
			}

			.upload-section {
				flex: 0 0 400px;
			}

			.result-section {
				flex: 1;
				display: flex;
			}
		}
	</style>
</head>

<body>
	<div class="header">
		<h1>PPTX to JSON Converter</h1>
		<p>Convert your PowerPoint presentations to readable JSON data instantly</p>
	</div>

	<div class="container">
		<div class="upload-section">
			<div class="upload-area" id="uploadArea">
				<div class="upload-icon">📁</div>
				<div class="upload-text">Choose PPTX File</div>
				<div class="upload-subtext">Drag and drop your PowerPoint file here, or click to browse</div>
				<button class="upload-button" id="uploadBtn">Select File</button>
				<input class="upload-input" type="file" accept=".pptx,application/vnd.openxmlformats-officedocument.presentationml.presentation" id="fileInput"/>
			</div>
			
			<div class="loading" id="loading">
				<div class="loading-spinner"></div>
				Processing your PPTX file...
			</div>

			<div class="links">
				<a target="_blank" href="https://github.com/pipipi-pikachu/pptx2json">GitHub Repository</a>
				<a target="_blank" href="https://pipipi-pikachu.github.io/PPTist/">Test in PPTist</a>
			</div>
		</div>

		<div class="result-section" id="resultSection">
			<div class="result-header">
				<div class="result-title">JSON Output</div>
				<button class="download-button" id="downloadBtn">
					💾 Download JSON
				</button>
			</div>
			<div id="jsoneditor"></div>
		</div>
	</div>
	
	<script>
		// DOM elements
		const uploadArea = document.getElementById('uploadArea');
		const uploadBtn = document.getElementById('uploadBtn');
		const fileInput = document.getElementById('fileInput');
		const loading = document.getElementById('loading');
		const resultSection = document.getElementById('resultSection');
		const downloadBtn = document.getElementById('downloadBtn');
		const container = document.querySelector('#jsoneditor');

		// Global variables
		let currentJsonData = null;
		let currentFileName = '';

		// Initialize JSON editor
		function initializeViewer() {
			container.innerHTML = `
				<div class="json-empty-state">
					<div class="icon">📄</div>
					<h3>No JSON data</h3>
					<p>Upload a PPTX file to see the converted JSON data here</p>
				</div>
			`;
		}

		// Custom JSON viewer
		function formatJsonValue(value, indent = 0) {
			const spaces = '  '.repeat(indent);
			
			if (value === null) {
				return '<span class="json-null">null</span>';
			}
			
			if (typeof value === 'string') {
				return `<span class="json-string">"${escapeHtml(value)}"</span>`;
			}
			
			if (typeof value === 'number') {
				return `<span class="json-number">${value}</span>`;
			}
			
			if (typeof value === 'boolean') {
				return `<span class="json-boolean">${value}</span>`;
			}
			
			if (Array.isArray(value)) {
				if (value.length === 0) {
					return '<span class="json-bracket">[]</span>';
				}
				
				let result = '<span class="json-bracket">[</span>\n';
				for (let i = 0; i < value.length; i++) {
					result += spaces + '  ' + formatJsonValue(value[i], indent + 1);
					if (i < value.length - 1) result += ',';
					result += '\n';
				}
				result += spaces + '<span class="json-bracket">]</span>';
				return result;
			}
			
			if (typeof value === 'object') {
				const keys = Object.keys(value);
				if (keys.length === 0) {
					return '<span class="json-brace">{}</span>';
				}
				
				let result = '<span class="json-brace">{</span>\n';
				for (let i = 0; i < keys.length; i++) {
					const key = keys[i];
					result += spaces + '  <span class="json-key">"' + escapeHtml(key) + '"</span>: ';
					result += formatJsonValue(value[key], indent + 1);
					if (i < keys.length - 1) result += ',';
					result += '\n';
				}
				result += spaces + '<span class="json-brace">}</span>';
				return result;
			}
			
			return String(value);
		}

		function escapeHtml(text) {
			const div = document.createElement('div');
			div.textContent = text;
			return div.innerHTML;
		}

		// Show loading state
		function showLoading() {
			loading.style.display = 'block';
			uploadArea.style.opacity = '0.5';
		}

		// Hide loading state
		function hideLoading() {
			loading.style.display = 'none';
			uploadArea.style.opacity = '1';
		}

		// Process file
		async function processFile(file) {
			if (!file) return;

			// Validate file type
			if (!file.name.toLowerCase().endsWith('.pptx')) {
				alert('Please select a valid PPTX file.');
				return;
			}

			currentFileName = file.name.replace(/\.pptx$/i, '');
			showLoading();

			try {
				const reader = new FileReader();
				reader.onload = async (e) => {
					try {
						// Parse PPTX file
						const json = await pptxtojson.parse(e.target.result);
						currentJsonData = json;
						
						// Display result
						displayResult(json);
						hideLoading();
						
						console.log('Parsed JSON:', json);
					} catch (error) {
						console.error('Error parsing PPTX:', error);
						hideLoading();
						alert('Error processing PPTX file. Please make sure it\'s a valid PowerPoint file.');
					}
				};
				reader.onerror = () => {
					hideLoading();
					alert('Error reading file. Please try again.');
				};
				reader.readAsArrayBuffer(file);
			} catch (error) {
				console.error('Error reading file:', error);
				hideLoading();
				alert('Error reading file. Please try again.');
			}
		}

		// Display result
		function displayResult(jsonData) {
			resultSection.style.display = 'flex';
			
			const formattedJson = formatJsonValue(jsonData);
			container.innerHTML = `<div class="json-viewer">${formattedJson}</div>`;

			// Scroll to result on mobile
			if (window.innerWidth <= 1200) {
				resultSection.scrollIntoView({ behavior: 'smooth' });
			}
		}

		// Download JSON file
		function downloadJson() {
			if (!currentJsonData) {
				alert('No data to download. Please process a PPTX file first.');
				return;
			}

			const jsonString = JSON.stringify(currentJsonData, null, 2);
			const blob = new Blob([jsonString], { type: 'application/json' });
			const url = URL.createObjectURL(blob);
			
			const a = document.createElement('a');
			a.href = url;
			a.download = currentFileName ? `${currentFileName}.json` : 'presentation.json';
			document.body.appendChild(a);
			a.click();
			document.body.removeChild(a);
			URL.revokeObjectURL(url);
		}

		// Event listeners
		fileInput.addEventListener('change', (evt) => {
			const file = evt.target.files[0];
			processFile(file);
		});

		uploadBtn.addEventListener('click', () => {
			fileInput.value = '';
			fileInput.click();
		});

		uploadArea.addEventListener('click', (e) => {
			if (e.target !== uploadBtn) {
				fileInput.value = '';
				fileInput.click();
			}
		});

		downloadBtn.addEventListener('click', downloadJson);

		// Drag and drop functionality
		uploadArea.addEventListener('dragover', (e) => {
			e.preventDefault();
			uploadArea.classList.add('dragover');
		});

		uploadArea.addEventListener('dragleave', (e) => {
			e.preventDefault();
			uploadArea.classList.remove('dragover');
		});

		uploadArea.addEventListener('drop', (e) => {
			e.preventDefault();
			uploadArea.classList.remove('dragover');
			
			const files = e.dataTransfer.files;
			if (files.length > 0) {
				processFile(files[0]);
			}
		});

		// Initialize viewer when page loads
		document.addEventListener('DOMContentLoaded', () => {
			initializeViewer();
		});
	</script>
</body>
</html>
